---
name: Test

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}-pr-{2}', github.workflow, github.event.pull_request.head.repo.full_name, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Integration tests — real network requests to api.bgm.tv
  # ============================================================
  integration-test:
    name: Integration Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run integration tests
        # BGM_TOKEN is required for authenticated endpoints (e.g. collections).
        # Without it those tests are skipped; public-API tests still run in full.
        # Fork PRs do not receive this secret — authenticated coverage only applies
        # to trusted/internal PRs where the secret is available.
        run: yarn test
        env:
          BGM_TOKEN: ${{ secrets.BGM_TOKEN }}
