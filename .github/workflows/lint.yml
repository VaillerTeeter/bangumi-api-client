---
name: Lint

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Markdown
  # ============================================================
  markdown-lint:
    name: Markdown Lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: ".lintrc/docs/markdown/.markdownlint.json"

  # ============================================================
  # YAML
  # ============================================================
  yaml-lint:
    name: YAML Lint (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint
        run: |
          find . \( -name "*.yml" -o -name "*.yaml" \) \
            ! -path "./.git/*" \
            | grep -v "node_modules\|vendor\|dist" \
            | xargs yamllint --config-file .lintrc/general/.yamllint.yml

  # ============================================================
  # TypeScript
  # ============================================================
  typescript-lint:
    name: TypeScript Lint (ESLint + Prettier + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install project dependencies
        run: yarn install --frozen-lockfile

      - name: Install lint tools
        run: |
          npm install --no-save --no-package-lock \
            eslint@8 \
            @typescript-eslint/eslint-plugin@7 \
            @typescript-eslint/parser@7 \
            eslint-plugin-import@2 \
            eslint-import-resolver-typescript@3 \
            eslint-plugin-unicorn@52 \
            eslint-plugin-sonarjs@0.25 \
            eslint-plugin-security@2 \
            eslint-plugin-promise@6 \
            eslint-plugin-n@17 \
            eslint-plugin-jsdoc@48 \
            prettier@3

      - name: Prettier — format check
        run: |
          npx prettier \
            --config .lintrc/frontend/prettier/.prettierrc \
            --check \
            --ignore-path .gitignore \
            "src/**/*.ts"

      - name: Generate API types
        run: yarn generate

      - name: ESLint — static analysis
        run: |
          npx eslint \
            --max-warnings 0 \
            --config .lintrc/frontend/typescript/.eslintrc-ts.json \
            "src/index.ts" "src/client.ts" "src/api/**/*.ts"

      - name: TypeScript — type check
        run: npx tsc --noEmit

  # ============================================================
  # Secret scanning
  # ============================================================
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .lintrc/security/.gitleaks.toml

  # ============================================================
  # Commit message
  # ============================================================
  commitlint-lint:
    name: Commitlint (Commit Message)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install commitlint
        run: |
          npm install --no-package-lock \
            @commitlint/cli@19.6.0 \
            @commitlint/config-conventional@19.6.0 \
            conventional-changelog-conventionalcommits@8.0.0

      - name: Lint commits
        run: |
          npx commitlint \
            --config .lintrc/git/.commitlintrc.cjs \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  # ============================================================
  # Spelling
  # ============================================================
  cspell-lint:
    name: CSpell (Spelling Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install cspell
        run: npm install -g cspell@8.17.1

      - name: Run cspell
        run: |
          cspell lint \
            --config .lintrc/general/cspell.json \
            --no-progress \
            --no-summary \
            --gitignore \
            --exclude ".lintrc/**" \
            "**"

  # ============================================================
  # Dead code / unused deps
  # ============================================================
  knip-lint:
    name: Knip (Dead Code Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install knip
        run: npm install -g knip@5.38.0

      - name: Run knip
        run: |
          knip \
            --config .lintrc/frontend/knip.json \
            --no-progress

  # ============================================================
  # File naming
  # ============================================================
  ls-lint:
    name: ls-lint (File Naming)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ls-lint
        run: |
          LS_LINT_VER="2.3.1"
          curl -sL \
            "https://github.com/loeffel-io/ls-lint/releases/download/v${LS_LINT_VER}/ls-lint-linux-amd64" \
            -o /usr/local/bin/ls-lint \
            && chmod +x /usr/local/bin/ls-lint

      - name: Run ls-lint
        run: ls-lint --config .lintrc/general/.ls-lint.yml

  # ============================================================
  # Summary gate — used as the single required status check
  # ============================================================
  all-checks:
    name: All Lint Checks Passed
    if: always()
    needs:
      - markdown-lint
      - yaml-lint
      - typescript-lint
      - secret-scan
      - commitlint-lint
      - cspell-lint
      - knip-lint
      - ls-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed (or were skipped)."
