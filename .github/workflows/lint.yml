      - name: Install Ameba
        if: steps.check.outputs.count != '0'
        run: |
          if [ -f "shard.yml" ]; then
            shards install
          else
            curl -fsSL \
              "https://github.com/crystal-ameba/ameba/releases/latest/download/ameba-linux" \
              -o /usr/local/bin/ameba
            chmod +x /usr/local/bin/ameba
          fi

      - name: Run Ameba
        if: steps.check.outputs.count != '0'
        run: ameba --config .lintrc/backend/crystal/.ameba.yml

      - name: Check Crystal formatting
        if: steps.check.outputs.count != '0'
        run: crystal tool format --check

  fsharp-lint:
    name: F# Lint (Fantomas + FSharpLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for F# files
        id: check
        run: |
          COUNT=$(find . \( -name "*.fs" -o -name "*.fsx" -o -name "*.fsi" \) \
