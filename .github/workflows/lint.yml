name: Lint

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up lint config
        run: cp .lintrc/docs/markdown/.markdownlint.json .markdownlint.json

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              colons:
                max-spaces-after: 2
              truthy:
                allowed-values: ["true", "false"]
                check-keys: false

  c-lint:
    name: C Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up C lint configs
        run: |
          cp .lintrc/backend/c-cpp/.clang-format .clang-format
          cp .lintrc/backend/c-cpp/.clang-tidy .clang-tidy

      - name: Lint C files (clang-format + clang-tidy)
        uses: cpp-linter/cpp-linter-action@v2
        id: cpp-linter
        with:
          style: file
          tidy-checks: ""
          files-changed-only: false
          extensions: "c,h"
          ignore: ".github"
          thread-comments: false
          step-summary: true
          extra-args: "-std=c11 -Wall -Wextra -Wpedantic"

      - name: Fail on clang-format or clang-tidy issues
        if: steps.cpp-linter.outputs.checks-failed > 0
        run: exit 1

      - name: Run cppcheck
        run: |
          sudo apt-get install -y --quiet cppcheck
          mapfile -t C_FILES < <(find . \( -name "*.c" -o -name "*.h" \) ! -path "./.github/*" 2>/dev/null)
          if [ ${#C_FILES[@]} -gt 0 ]; then
            cppcheck \
              --enable=all \
              --error-exitcode=1 \
              --suppress=missingIncludeSystem \
              --suppress=missingInclude \
              --suppress=unusedFunction \
              --std=c11 \
              --platform=unix64 \
              --inline-suppr \
              --verbose \
              "${C_FILES[@]}"
          else
            echo "No C files found, skipping cppcheck."
          fi

      - name: Run flawfinder (security scan)
        run: |
          pip install --quiet flawfinder==2.0.19
          mapfile -t C_FILES < <(find . \( -name "*.c" -o -name "*.h" \) ! -path "./.github/*" 2>/dev/null)
          if [ ${#C_FILES[@]} -gt 0 ]; then
            flawfinder --minlevel=1 --error-level=4 "${C_FILES[@]}"
          else
            echo "No C files found, skipping flawfinder."
          fi

  cpp-lint:
    name: C++ Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ lint tools
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y --quiet clang-format clang-tidy cppcheck

      - name: Run clang-format (format check)
        run: |
          mapfile -t CPP_FILES < <(find . \
            \( -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" \
               -o -name "*.hpp" -o -name "*.hh" -o -name "*.hxx" \) \
            ! -path "./.github/*" 2>/dev/null)
          if [ ${#CPP_FILES[@]} -gt 0 ]; then
            clang-format --style=file:.lintrc/backend/c-cpp/.clang-format --dry-run --Werror "${CPP_FILES[@]}"
          else
            echo "No C++ files found, skipping clang-format."
          fi

      - name: Run clang-tidy (static analysis)
        run: |
          mapfile -t CPP_SRC < <(find . \
            \( -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" \) \
            ! -path "./.github/*" 2>/dev/null)
          if [ ${#CPP_SRC[@]} -gt 0 ]; then
            clang-tidy \
              --config-file=.lintrc/backend/c-cpp/.clang-tidy-cpp \
              "${CPP_SRC[@]}" -- \
              -std=c++17 -Wall -Wextra -Wpedantic \
              -Wnon-virtual-dtor -Woverloaded-virtual
          else
            echo "No C++ source files found, skipping clang-tidy."
          fi

      - name: Run cppcheck
        run: |
          mapfile -t CPP_FILES < <(find . \
            \( -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" \
               -o -name "*.hpp" -o -name "*.hh" -o -name "*.hxx" \) \
            ! -path "./.github/*" 2>/dev/null)
          if [ ${#CPP_FILES[@]} -gt 0 ]; then
            cppcheck \
              --enable=all \
              --error-exitcode=1 \
              --suppress=missingIncludeSystem \
              --suppress=missingInclude \
              --suppress=unusedFunction \
              --std=c++17 \
              --platform=unix64 \
              --inline-suppr \
              --verbose \
              "${CPP_FILES[@]}"
          else
            echo "No C++ files found, skipping cppcheck."
          fi

      - name: Run flawfinder (security scan)
        run: |
          pip install --quiet flawfinder==2.0.19
          mapfile -t CPP_FILES < <(find . \
            \( -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" \
               -o -name "*.hpp" -o -name "*.hh" -o -name "*.hxx" \) \
            ! -path "./.github/*" 2>/dev/null)
          if [ ${#CPP_FILES[@]} -gt 0 ]; then
            flawfinder --minlevel=1 --error-level=4 "${CPP_FILES[@]}"
          else
            echo "No C++ files found, skipping flawfinder."
          fi

      - name: Run cpplint (Google C++ style)
        run: |
          pip install --quiet cpplint==2.0.0
          mapfile -t CPP_FILES < <(find . \
            \( -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" \
               -o -name "*.hpp" -o -name "*.hh" -o -name "*.hxx" \) \
            ! -path "./.github/*" 2>/dev/null)
          if [ ${#CPP_FILES[@]} -gt 0 ]; then
            cpplint \
              --filter=-legal/copyright \
              --linelength=100 \
              "${CPP_FILES[@]}"
          else
            echo "No C++ files found, skipping cpplint."
          fi

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install \
            black==24.10.0 \
            isort==5.13.2 \
            flake8==7.1.1 \
            flake8-bugbear==24.10.31 \
            flake8-comprehensions==3.15.0 \
            flake8-simplify==0.21.0 \
            flake8-pie==0.16.0 \
            flake8-return==1.2.0 \
            flake8-raise==0.0.5 \
            flake8-unused-arguments==0.0.13 \
            pep8-naming==0.14.1 \
            flake8-annotations==3.1.1 \
            flake8-docstrings==1.7.0 \
            flake8-bandit==4.1.1 \
            flake8-isort==6.1.1 \
            flake8-eradicate==1.5.0 \
            flake8-builtins==2.5.0 \
            pylint==3.3.3 \
            mypy==1.14.1 \
            bandit[toml]==1.8.0

      - name: Check Python files exist
        id: check-py
        run: |
          mapfile -t PY_FILES < <(find . -name "*.py" ! -path "./.github/*" 2>/dev/null)
          if [ ${#PY_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#PY_FILES[@]} Python file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Python files found."
          fi

      - name: black (format check)
        if: steps.check-py.outputs.found == 'true'
        run: |
          mapfile -t PY_FILES < <(find . -name "*.py" ! -path "./.github/*" 2>/dev/null)
          black --config .lintrc/backend/python/pyproject.toml --check --diff "${PY_FILES[@]}"

      - name: isort (import order check)
        if: steps.check-py.outputs.found == 'true'
        run: |
          mapfile -t PY_FILES < <(find . -name "*.py" ! -path "./.github/*" 2>/dev/null)
          isort --settings-path .lintrc/backend/python/pyproject.toml --check-only --diff "${PY_FILES[@]}"

      - name: flake8 (style + bug patterns)
        if: steps.check-py.outputs.found == 'true'
        run: |
          mapfile -t PY_FILES < <(find . -name "*.py" ! -path "./.github/*" 2>/dev/null)
          flake8 \
            --config .lintrc/backend/python/.flake8 \
            "${PY_FILES[@]}"

      - name: pylint (deep static analysis)
        if: steps.check-py.outputs.found == 'true'
        run: |
          mapfile -t PY_FILES < <(find . -name "*.py" ! -path "./.github/*" 2>/dev/null)
          pylint \
            --rcfile=.lintrc/backend/python/.pylintrc \
            "${PY_FILES[@]}"

      - name: mypy (type checking)
        if: steps.check-py.outputs.found == 'true'
        run: |
          mapfile -t PY_FILES < <(find . -name "*.py" ! -path "./.github/*" 2>/dev/null)
          mypy \
            --config-file=.lintrc/backend/python/mypy.ini \
            "${PY_FILES[@]}"

      - name: bandit (security scan)
        if: steps.check-py.outputs.found == 'true'
        run: |
          bandit \
            --configfile=.lintrc/backend/python/pyproject.toml \
            --severity-level=low \
            --confidence-level=low \
            --recursive \
            --exclude .git,.github,__pycache__,.venv,venv,env,build,dist,.mypy_cache,.pytest_cache,.tox \
            .

  java-lint:
    name: Java Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Check Java files exist
        id: check-java
        run: |
          mapfile -t JAVA_FILES < <(find . -name "*.java" ! -path "./.github/*" 2>/dev/null)
          if [ ${#JAVA_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#JAVA_FILES[@]} Java file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Java files found."
          fi

      - name: Checkstyle (coding standards)
        if: steps.check-java.outputs.found == 'true'
        run: |
          CS_VER="10.21.4"
          curl -sSL "https://github.com/checkstyle/checkstyle/releases/download/checkstyle-${CS_VER}/checkstyle-${CS_VER}-all.jar" \
            -o checkstyle.jar
          mapfile -t JAVA_FILES < <(find . -name "*.java" ! -path "./.github/*" 2>/dev/null)
          java -jar checkstyle.jar \
            -c .lintrc/backend/java/checkstyle.xml \
            "${JAVA_FILES[@]}"

      - name: PMD (static analysis)
        if: steps.check-java.outputs.found == 'true'
        run: |
          PMD_VER="7.10.0"
          curl -sSL "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VER}/pmd-dist-${PMD_VER}-bin.zip" \
            -o pmd.zip
          unzip -q pmd.zip
          PMD_DIR=$(find . -maxdepth 1 -type d -name "pmd-bin-*" | head -1)
          "${PMD_DIR}/bin/pmd" check \
            --rulesets .lintrc/backend/java/pmd-ruleset.xml \
            --dir . \
            --exclude ./.github \
            --format text \
            --fail-on-violation

      - name: SpotBugs (bytecode analysis)
        if: steps.check-java.outputs.found == 'true'
        run: |
          SB_VER="4.9.3"
          curl -sSL "https://github.com/spotbugs/spotbugs/releases/download/${SB_VER}/spotbugs-${SB_VER}.zip" \
            -o spotbugs.zip
          unzip -q spotbugs.zip
          SB_DIR=$(find . -maxdepth 1 -type d -name "spotbugs-*" | head -1)

          # 先编译 Java 源码（SpotBugs 分析字节码）
          mapfile -t JAVA_FILES < <(find . -name "*.java" ! -path "./.github/*" 2>/dev/null)
          mkdir -p /tmp/java_classes
          javac -d /tmp/java_classes "${JAVA_FILES[@]}" 2>/dev/null || true

          "${SB_DIR}/bin/spotbugs" \
            -textui \
            -effort:max \
            -threshold:Low \
            -exclude .lintrc/backend/java/spotbugs-exclude.xml \
            -exitcode \
            /tmp/java_classes

      - name: google-java-format (format check)
        if: steps.check-java.outputs.found == 'true'
        run: |
          GJF_VER="1.25.2"
          curl -sSL "https://github.com/google/google-java-format/releases/download/v${GJF_VER}/google-java-format-${GJF_VER}-all-deps.jar" \
            -o gjf.jar
          FAIL=0
          while IFS= read -r -d '' f; do
            java -jar gjf.jar --dry-run --set-exit-if-changed "$f" || FAIL=1
          done < <(find . -name "*.java" ! -path "./.github/*" -print0 2>/dev/null)
          exit $FAIL

  js-lint:
    name: JavaScript Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript files exist
        id: check-js
        run: |
          mapfile -t JS_FILES < <(find . \
            \( -name "*.js" -o -name "*.jsx" -o -name "*.mjs" -o -name "*.cjs" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" 2>/dev/null)
          if [ ${#JS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#JS_FILES[@]} JavaScript file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No JavaScript files found."
          fi

      - name: Install JavaScript lint tools
        if: steps.check-js.outputs.found == 'true'
        run: |
          npm init -y
          npm install --save-dev \
            eslint@8 \
            eslint-plugin-import@2 \
            eslint-plugin-unicorn@52 \
            eslint-plugin-sonarjs@0.25 \
            eslint-plugin-security@2 \
            eslint-plugin-promise@6 \
            eslint-plugin-n@17 \
            eslint-plugin-jsdoc@48 \
            prettier@3

      - name: Prettier (format check)
        if: steps.check-js.outputs.found == 'true'
        run: |
          mapfile -t JS_FMT_FILES < <(find . \
            \( -name "*.js" -o -name "*.jsx" -o -name "*.mjs" -o -name "*.cjs" \) \
            ! -path "./.github/*" ! -path "./.lintrc/*" ! -path "./node_modules/*" 2>/dev/null)
          if [ ${#JS_FMT_FILES[@]} -gt 0 ]; then
            npx prettier --config .lintrc/frontend/prettier/.prettierrc \
              --check "${JS_FMT_FILES[@]}"
          fi

      - name: ESLint (static analysis)
        if: steps.check-js.outputs.found == 'true'
        run: |
          mapfile -t JS_FILES < <(find . \
            \( -name "*.js" -o -name "*.jsx" -o -name "*.mjs" -o -name "*.cjs" \) \
            ! -path "./.github/*" ! -path "./.lintrc/*" ! -path "./node_modules/*" 2>/dev/null)
          npx eslint --max-warnings 0 --config .lintrc/frontend/javascript/.eslintrc-js.json "${JS_FILES[@]}"

  typescript-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check TypeScript files exist
        id: check-ts
        run: |
          mapfile -t TS_FILES < <(find . \
            \( -name "*.ts" -o -name "*.tsx" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" 2>/dev/null)
          if [ ${#TS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#TS_FILES[@]} TypeScript file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No TypeScript files found."
          fi

      - name: Install TypeScript lint tools
        if: steps.check-ts.outputs.found == 'true'
        run: |
          npm init -y
          npm install --save-dev \
            eslint@8 \
            @typescript-eslint/eslint-plugin@7 \
            @typescript-eslint/parser@7 \
            eslint-plugin-import@2 \
            eslint-import-resolver-typescript@3 \
            eslint-plugin-unicorn@52 \
            eslint-plugin-sonarjs@0.25 \
            eslint-plugin-security@2 \
            eslint-plugin-promise@6 \
            eslint-plugin-n@17 \
            eslint-plugin-jsdoc@48 \
            prettier@3 \
            typescript@5

      - name: Prettier (format check)
        if: steps.check-ts.outputs.found == 'true'
        run: |
          npx prettier --config .lintrc/frontend/prettier/.prettierrc \
            --check "**/*.ts" "**/*.tsx" \
            --ignore-path .gitignore

      - name: ESLint (static analysis)
        if: steps.check-ts.outputs.found == 'true'
        run: |
          mapfile -t TS_FILES < <(find . \
            \( -name "*.ts" -o -name "*.tsx" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" 2>/dev/null)
          npx eslint --max-warnings 0 --config .lintrc/frontend/typescript/.eslintrc-ts.json "${TS_FILES[@]}"

      - name: TypeScript type check
        if: steps.check-ts.outputs.found == 'true'
        run: npx tsc --project .lintrc/frontend/typescript/tsconfig-lint.json --noEmit

  vue-lint:
    name: Vue3 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Vue files exist
        id: check-vue
        run: |
          mapfile -t VUE_FILES < <(find . -name "*.vue" \
            ! -path "./.github/*" ! -path "./node_modules/*" 2>/dev/null)
          if [ ${#VUE_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#VUE_FILES[@]} Vue file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Vue files found."
          fi

      - name: Install Vue lint tools
        if: steps.check-vue.outputs.found == 'true'
        run: |
          npm init -y
          npm install --save-dev \
            eslint@8 \
            eslint-plugin-vue@9 \
            vue-eslint-parser@9 \
            @typescript-eslint/eslint-plugin@7 \
            @typescript-eslint/parser@7 \
            eslint-plugin-import@2 \
            eslint-import-resolver-typescript@3 \
            eslint-plugin-sonarjs@0.25 \
            eslint-plugin-security@2 \
            eslint-plugin-promise@6 \
            prettier@3 \
            typescript@5

      - name: Prettier (format check)
        if: steps.check-vue.outputs.found == 'true'
        run: |
          npx prettier --config .lintrc/frontend/prettier/.prettierrc \
            --check "**/*.vue" \
            --ignore-path .gitignore

      - name: ESLint (static analysis)
        if: steps.check-vue.outputs.found == 'true'
        run: |
          mapfile -t VUE_FILES < <(find . -name "*.vue" \
            ! -path "./.github/*" ! -path "./node_modules/*" 2>/dev/null)
          npx eslint --max-warnings 0 --config .lintrc/frontend/frameworks/.eslintrc-vue.json --ext .vue "${VUE_FILES[@]}"

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust files exist
        id: check-rs
        run: |
          mapfile -t RS_FILES < <(find . -name "*.rs" \
            ! -path "./target/*" ! -path "./.github/*" 2>/dev/null)
          if [ ${#RS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#RS_FILES[@]} Rust file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Rust files found."
          fi

      - name: rustfmt (format check)
        if: steps.check-rs.outputs.found == 'true'
        run: |
          if [ -f "Cargo.toml" ]; then
            cargo fmt --all -- --check
          else
            mapfile -t RS_FILES < <(find . -name "*.rs" ! -path "./target/*" 2>/dev/null)
            rustfmt --edition 2021 --config-path .lintrc/backend/rust/ --check "${RS_FILES[@]}"
          fi

      - name: Set up Clippy config
        if: steps.check-rs.outputs.found == 'true'
        run: cp .lintrc/backend/rust/.clippy.toml clippy.toml

      - name: Clippy (static analysis)
        if: steps.check-rs.outputs.found == 'true'
        run: |
          if [ -f "Cargo.toml" ]; then
            cargo clippy --all-targets --all-features -- \
              -D warnings \
              -D clippy::all \
              -D clippy::pedantic \
              -D clippy::nursery \
              -W clippy::cargo
          else
            echo "No Cargo.toml found, skipping clippy."
          fi

      - name: cargo audit (dependency security)
        if: steps.check-rs.outputs.found == 'true'
        run: |
          if [ -f "Cargo.lock" ]; then
            cargo install cargo-audit --quiet
            cargo audit
          else
            echo "No Cargo.lock found, skipping cargo audit."
          fi

  css-lint:
    name: CSS Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check CSS/SCSS/Less files exist
        id: check-css
        run: |
          mapfile -t CSS_FILES < <(find . \
            \( -name "*.css" -o -name "*.scss" -o -name "*.sass" -o -name "*.less" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" 2>/dev/null)
          if [ ${#CSS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#CSS_FILES[@]} CSS/SCSS/Less file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No CSS/SCSS/Less files found."
          fi

      - name: Install Stylelint
        if: steps.check-css.outputs.found == 'true'
        run: |
          npm init -y
          npm install --save-dev \
            stylelint@16 \
            stylelint-config-standard@36 \
            stylelint-config-recess-order@5 \
            stylelint-scss@6 \
            postcss-scss@4 \
            postcss-less@6 \
            postcss-html@1

      - name: Stylelint (CSS/SCSS/Less)
        if: steps.check-css.outputs.found == 'true'
        run: |
          npx stylelint \
            --config .lintrc/frontend/css-styles/.stylelintrc.json \
            "**/*.{css,scss,sass,less}" \
            --ignore-path .gitignore \
            --allow-empty-input

  powershell-lint:
    name: PowerShell Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PowerShell files exist
        id: check-ps
        shell: bash
        run: |
          mapfile -t PS_FILES < <(find . \
            \( -name "*.ps1" -o -name "*.psm1" \) \
            ! -path "./.github/*" 2>/dev/null)
          if [ ${#PS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#PS_FILES[@]} PowerShell file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No PowerShell files found."
          fi

      - name: Install PSScriptAnalyzer
        if: steps.check-ps.outputs.found == 'true'
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.23.0 -Force -Scope CurrentUser

      - name: PSScriptAnalyzer (static analysis)
        if: steps.check-ps.outputs.found == 'true'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Include "*.ps1","*.psm1" |
            Where-Object { $_.FullName -notlike "*/.github/*" }
          if ($files.Count -eq 0) { Write-Host "No files to analyze."; exit 0 }
          $results = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -Settings .lintrc/infrastructure/shell/PSScriptAnalyzerSettings.psd1 `
            -Severity Error,Warning,Information
          if ($results) {
            $results | Format-Table RuleName, Severity, Line, Message -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer: No issues found."

