            echo "No Dockerfiles found, skipping."
          fi

      - name: Install hadolint
        if: steps.check-docker.outputs.found == 'true'
        run: |
          HADOLINT_VER="2.12.0"
          curl -sSL \
            "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VER}/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: hadolint (Dockerfile best practices)
        if: steps.check-docker.outputs.found == 'true'
        run: |
          mapfile -t DOCKER_FILES < <(find . \
            \( -name "Dockerfile" -o -name "Dockerfile.*" -o -name "*.dockerfile" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          hadolint \
            --config .lintrc/infrastructure/docker/.hadolint.yaml \
            --format github_actions \
            "${DOCKER_FILES[@]}"

  terraform-lint:
    name: Terraform / HCL Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Terraform files exist
        id: check-tf
        run: |
          mapfile -t TF_FILES < <(find . \( -name "*.tf" -o -name "*.tfvars" \) \
            ! -path "./.github/*" ! -path "./vendor/*" \
            ! -path "./.terraform/*" 2>/dev/null)
          if [ ${#TF_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#TF_FILES[@]} Terraform file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Terraform files found, skipping."
          fi

      - name: Install Terraform
        if: steps.check-tf.outputs.found == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.x"

      - name: terraform fmt (format check)
        if: steps.check-tf.outputs.found == 'true'
        run: terraform fmt -check -recursive -diff .

      - name: terraform validate
        if: steps.check-tf.outputs.found == 'true'
        run: |
          # 遍历所有含 .tf 文件的目录，逐个 validate
          mapfile -t TF_DIRS < <(find . -name "*.tf" \
            ! -path "./.github/*" ! -path "./.terraform/*" \
            -exec dirname {} \; | sort -u)
          for dir in "${TF_DIRS[@]}"; do
            echo "Validating: $dir"
            if ! (cd "$dir" \
              && terraform init -backend=false -input=false -no-color 2>&1 | tail -1 \
              && terraform validate -no-color); then
              exit 1
            fi
          done

      - name: Install TFLint
        if: steps.check-tf.outputs.found == 'true'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.0

      - name: tflint (lint)
        if: steps.check-tf.outputs.found == 'true'
        run: |
          tflint --init --config .lintrc/infrastructure/terraform/.tflint.hcl
          tflint --config .lintrc/infrastructure/terraform/.tflint.hcl --format compact --recursive

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Ansible files exist
        id: check-ansible
        run: |
          mapfile -t ANS_FILES < <(find . \
            \( -name "*.yml" -o -name "*.yaml" \) \
            \( -path "*/playbooks/*" -o -path "*/roles/*" \
               -o -path "*/tasks/*" -o -name "site.yml" \
               -o -name "playbook.yml" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          if [ ${#ANS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#ANS_FILES[@]} Ansible file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Ansible files found, skipping."
          fi

      - name: Set up Python
        if: steps.check-ansible.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        if: steps.check-ansible.outputs.found == 'true'
        run: |
          pip install \
            ansible-lint==25.1.2 \
            ansible-core==2.18.1 \
            yamllint==1.35.1

      - name: ansible-lint
        if: steps.check-ansible.outputs.found == 'true'
        run: |
          ansible-lint \
            --config-file .lintrc/infrastructure/ansible/.ansible-lint.yml \
            --format github \
            --show-relpath

  k8s-lint:
    name: Kubernetes Manifests Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Kubernetes manifest files exist
        id: check-k8s
        run: |
          mapfile -t K8S_FILES < <(find . \
            \( -name "*.yaml" -o -name "*.yml" \) \
            \( -path "*/k8s/*" -o -path "*/kubernetes/*" \
               -o -path "*/manifests/*" -o -path "*/deploy/*" \
               -o -path "*/chart/*" -o -path "*/charts/*" \
               -o -path "*/helm/*" \) \
            ! -path "./.github/*" ! -path "./vendor/*" 2>/dev/null)
          if [ ${#K8S_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#K8S_FILES[@]} Kubernetes manifest file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Kubernetes manifest files found, skipping."
          fi

      - name: Install kubeconform
        if: steps.check-k8s.outputs.found == 'true'
        run: |
          KUBECONFORM_VER="0.6.7"
          curl -sSL \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VER}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin/ kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: kubeconform (schema validation)
        if: steps.check-k8s.outputs.found == 'true'
        run: |
          mapfile -t K8S_FILES < <(find . \
            \( -name "*.yaml" -o -name "*.yml" \) \
            \( -path "*/k8s/*" -o -path "*/kubernetes/*" \
               -o -path "*/manifests/*" -o -path "*/deploy/*" \
               -o -path "*/chart/*" -o -path "*/charts/*" \
               -o -path "*/helm/*" \) \
            ! -path "./.github/*" ! -path "./vendor/*" \
            ! -path "./.lintrc/*" 2>/dev/null)
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            -output text \
            -kubernetes-version 1.32.0 \
            "${K8S_FILES[@]}"

      - name: Install kube-linter
        if: steps.check-k8s.outputs.found == 'true'
        run: |
          KUBELINTER_VER="0.7.2"
          curl -sSL \
            "https://github.com/stackrox/kube-linter/releases/download/v${KUBELINTER_VER}/kube-linter-linux.tar.gz" \
            | tar xz -C /usr/local/bin/ kube-linter
          chmod +x /usr/local/bin/kube-linter

      - name: kube-linter (best practices)
        if: steps.check-k8s.outputs.found == 'true'
        run: |
          mapfile -t K8S_DIRS < <(find . \
            \( -path "*/k8s" -o -path "*/kubernetes" \
               -o -path "*/manifests" -o -path "*/deploy" \
               -o -path "*/charts" -o -path "*/helm" \) \
            -type d ! -path "./.github/*" ! -path "./vendor/*" 2>/dev/null)
          if [ ${#K8S_DIRS[@]} -gt 0 ]; then
            kube-linter lint \
              --config .lintrc/infrastructure/kubernetes/.kube-linter.yaml \
              "${K8S_DIRS[@]}"
          else
            echo "No Kubernetes directories found for kube-linter."
          fi

  github-actions-lint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub Actions files exist
        id: check-gha
        run: |
          mapfile -t GHA_FILES < <(find .github/workflows -name "*.yml" \
            -o -name "*.yaml" 2>/dev/null)
          if [ ${#GHA_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#GHA_FILES[@]} workflow file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No GitHub Actions workflow files found, skipping."
          fi

      - name: Install actionlint
        if: steps.check-gha.outputs.found == 'true'
        run: |
          ACTIONLINT_VER="1.7.7"
          curl -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VER}/actionlint_${ACTIONLINT_VER}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin/ actionlint
          chmod +x /usr/local/bin/actionlint

      - name: Install ShellCheck (actionlint dependency)
        if: steps.check-gha.outputs.found == 'true'
        run: sudo apt-get install -y --quiet shellcheck

      - name: actionlint
        if: steps.check-gha.outputs.found == 'true'
        run: |
          mapfile -t GHA_FILES < <(find .github/workflows -name "*.yml" \
            -o -name "*.yaml" 2>/dev/null)
          actionlint "${GHA_FILES[@]}"

  r-lint:
    name: R Lint (lintr + styler)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for R files
        id: check
        run: |
          COUNT=$(find . \( -name "*.R" -o -name "*.Rmd" \) \
            | { grep -vc "vendor\|node_modules\|renv\|\.Rproj\.user" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up R
        if: steps.check.outputs.count != '0'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install lintr and styler
        if: steps.check.outputs.count != '0'
        run: install.packages(c("lintr", "styler"), repos = "https://cran.rstudio.com/")
        shell: Rscript {0}

      - name: Set up lintr config
        if: steps.check.outputs.count != '0'
        run: cp .lintrc/backend/r/.lintr .lintr

      - name: Run lintr
        if: steps.check.outputs.count != '0'
        run: lintr::lint_dir(".")
        shell: Rscript {0}

      - name: Check styler formatting
        if: steps.check.outputs.count != '0'
        run: |
          if (any(styler::style_dir(".", dry = "on")$changed, na.rm = TRUE)) {
            stop("Files need reformatting. Run styler::style_dir() locally.")
          }
        shell: Rscript {0}

  groovy-lint:
    name: Groovy Lint (CodeNarc via npm-groovy-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Groovy files
        id: check
        run: |
          COUNT=$(find . -name "*.groovy" \
            | { grep -vc "vendor\|node_modules\|\.gradle\|build" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install npm-groovy-lint
        if: steps.check.outputs.count != '0'
        run: npm install -g npm-groovy-lint@14.7.0

      - name: Run Groovy lint
        if: steps.check.outputs.count != '0'
        run: |
          npm-groovy-lint \
            --path . \
            --ignorepattern "**/vendor/**,**/node_modules/**,**/.gradle/**,**/build/**" \
            --config .lintrc/backend/groovy/codenarc.xml \
            --failon warning \
            --no-insight

  elixir-lint:
    name: Elixir Lint (Credo + mix format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Elixir files
        id: check
        run: |
          COUNT=$(find . \( -name "*.ex" -o -name "*.exs" \) \
            | { grep -vc "_build\|deps\|node_modules\|\.lintrc" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Elixir
        if: steps.check.outputs.count != '0'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '26.x'
          elixir-version: '1.16.x'

      - name: Cache deps
        if: steps.check.outputs.count != '0'
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        if: steps.check.outputs.count != '0'
        run: mix deps.get

      - name: Check mix format
        if: steps.check.outputs.count != '0'
        run: mix format --check-formatted

      - name: Run Credo (strict)
        if: steps.check.outputs.count != '0'
        run: mix credo --strict --config .lintrc/backend/elixir/.credo.exs

  haskell-lint:
    name: Haskell Lint (HLint + Fourmolu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Haskell files
        id: check
        run: |
          COUNT=$(find . \( -name "*.hs" -o -name "*.lhs" \) \
            | { grep -vc "\.stack-work\|dist-newstyle\|vendor" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up HLint
        if: steps.check.outputs.count != '0'
        uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.8'

      - name: Set up HLint config
        if: steps.check.outputs.count != '0'
        run: cp .lintrc/backend/haskell/.hlint.yaml .hlint.yaml

      - name: Run HLint
        if: steps.check.outputs.count != '0'
        uses: haskell-actions/hlint-run@v2
        with:
          path: '["."]'
          fail-on: warning

      - name: Set up GHC
        if: steps.check.outputs.count != '0'
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'

      - name: Install Fourmolu
        if: steps.check.outputs.count != '0'
        run: cabal install fourmolu

      - name: Check Fourmolu formatting
        if: steps.check.outputs.count != '0'
        run: |
          mapfile -t HS_FILES < <(find . -name "*.hs" | grep -v "\.stack-work\|dist-newstyle\|vendor")
          fourmolu --mode check "${HS_FILES[@]}"

  erlang-lint:
    name: Erlang Lint (Elvis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Erlang files
        id: check
        run: |
          COUNT=$(find . \( -name "*.erl" -o -name "*.hrl" \) \
            | { grep -vc "_build\|deps\|vendor" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Erlang/OTP
        if: steps.check.outputs.count != '0'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '26.x'

      - name: Download Elvis
        if: steps.check.outputs.count != '0'
        run: |
          ELVIS_VER="3.1.0"
          curl -fsSL \
            "https://github.com/inaka/elvis/releases/download/${ELVIS_VER}/elvis" \
            -o /usr/local/bin/elvis
          chmod +x /usr/local/bin/elvis

      - name: Run Elvis
        if: steps.check.outputs.count != '0'
        run: elvis rock --config .lintrc/backend/erlang/.elvis.config

  perl-lint:
    name: Perl Lint (Perl::Critic + perltidy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Perl files
        id: check
        run: |
          COUNT=$(find . \( -name "*.pl" -o -name "*.pm" -o -name "*.t" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Perl::Critic and Perl::Tidy
        if: steps.check.outputs.count != '0'
        run: sudo cpanm --notest Perl::Critic@1.152 Perl::Tidy@20240511

      - name: Run perlcritic
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.pl" -o -name "*.pm" \) \
            | grep -v "vendor\|node_modules" \
            | xargs perlcritic --profile .lintrc/backend/perl/.perlcriticrc

      - name: Check perltidy formatting
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.pl" -o -name "*.pm" \) \
            | grep -v "vendor\|node_modules" | while read -r f; do
            perltidy -l=120 -i=4 "$f" -o /tmp/tidy_out
            if ! diff -q "$f" /tmp/tidy_out > /dev/null 2>&1; then
              echo "ERROR: $f needs perltidy formatting"
              diff "$f" /tmp/tidy_out
              exit 1
            fi
          done

  julia-lint:
    name: Julia Lint (JuliaFormatter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Julia files
        id: check
        run: |
          COUNT=$(find . -name "*.jl" \
            | { grep -vc "vendor\|node_modules\|\.julia" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Julia
        if: steps.check.outputs.count != '0'
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Install JuliaFormatter
        if: steps.check.outputs.count != '0'
        run: julia -e 'using Pkg; Pkg.add("JuliaFormatter")'

      - name: Set up JuliaFormatter config
        if: steps.check.outputs.count != '0'
        run: cp .lintrc/backend/julia/.JuliaFormatter.toml .JuliaFormatter.toml

      - name: Check formatting
        if: steps.check.outputs.count != '0'
        run: |
          julia -e '
            using JuliaFormatter
            if !format(".", overwrite=false)
              error("Julia files need formatting. Run format(\".\") locally.")
            end
          '

  zig-lint:
    name: Zig Lint (zig fmt + zig ast-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Zig files
        id: check
        run: |
          COUNT=$(find . -name "*.zig" \
            | { grep -vc "zig-cache\|zig-out\|vendor" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Zig
        if: steps.check.outputs.count != '0'
        uses: mlugg/setup-zig@v1
        with:
          version: 'latest'

      - name: Check zig fmt
        if: steps.check.outputs.count != '0'
        run: zig fmt --check .

      - name: zig ast-check
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.zig" | grep -v "zig-cache\|zig-out\|vendor" \
            | xargs -I{} zig ast-check {}

  nim-lint:
    name: Nim Lint (nimpretty + nim check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Nim files
        id: check
        run: |
          COUNT=$(find . \( -name "*.nim" -o -name "*.nims" \) \
            | { grep -vc "nimcache\|vendor\|\.nimble" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Nim
        if: steps.check.outputs.count != '0'
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Check nimpretty formatting
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.nim" | grep -v "nimcache\|vendor\|\.nimble" | while read -r f; do
            nimpretty --indent:2 --maxLineLen:120 "$f" --output:/tmp/nim_out
            if ! diff -q "$f" /tmp/nim_out > /dev/null 2>&1; then
              echo "ERROR: $f needs nimpretty formatting"
              diff "$f" /tmp/nim_out
              exit 1
            fi
          done

      - name: nim check
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.nim" | grep -v "nimcache\|vendor\|\.nimble" \
            | xargs -I{} nim check {}

  crystal-lint:
    name: Crystal Lint (Ameba + crystal tool format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Crystal files
        id: check
        run: |
          COUNT=$(find . -name "*.cr" \
            | { grep -vc "vendor\|lib\|\.crystal" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

