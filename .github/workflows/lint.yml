          version: 'latest'

      - name: Run helm lint
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "Chart.yaml" | grep -v "vendor\|node_modules" \
            | while read -r chart; do
              dir=$(dirname "$chart")
              echo "Linting Helm chart in $dir ..."
              helm lint "$dir" --strict
            done

      - name: Run helm template
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "Chart.yaml" | grep -v "vendor\|node_modules" \
            | while read -r chart; do
              dir=$(dirname "$chart")
              helm template test-release "$dir" > /dev/null
            done

  cloudformation-lint:
    name: AWS CloudFormation Lint (cfn-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for CloudFormation files
        id: check
        run: |
          COUNT=$(find . \
            \( -path "*/cloudformation/*" \
            -o -path "*/cfn/*" \
            -o -path "*/infrastructure/*" \) \
            ! -path "./.lintrc/*" \
            \( -name "*.yml" -o -name "*.yaml" -o -name "*.json" \) \
            | { grep -vc "node_modules\|vendor" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        if: steps.check.outputs.count != '0'
        run: pip install cfn-lint>=1.22

      - name: Run cfn-lint
        if: steps.check.outputs.count != '0'
        run: cfn-lint --config-file .lintrc/infrastructure/cloudformation/.cfnlintrc.yml

  bicep-lint:
    name: Azure Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Bicep files
        id: check
        run: |
          COUNT=$(find . \( -name "*.bicep" -o -name "*.bicepparam" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Azure CLI + Bicep
        if: steps.check.outputs.count != '0'
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: Bicep build (lint)
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.bicep" | grep -v "vendor\|node_modules" | while read -r f; do
            echo "Building $f ..."
            az bicep build --file "$f" --no-restore
          done

      # Note: 'az bicep build' already performs lint checks.
      # 'az bicep lint' requires Azure CLI 2.61+ and may not be available on all runners.

  gitlab-ci-lint:
    name: GitLab CI Lint (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for GitLab CI files
        id: check
        run: |
          COUNT=$(find . \( -name ".gitlab-ci.yml" -o -name ".gitlab-ci.yaml" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        if: steps.check.outputs.count != '0'
        run: pip install yamllint==1.35.1

      - name: Run yamllint on GitLab CI configs
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name ".gitlab-ci.yml" -o -name ".gitlab-ci.yaml" \) \
            | grep -v "vendor\|node_modules" \
            | xargs yamllint \
              -d '{extends: default, rules: {line-length: {max: 200}, truthy: {allowed-values: ["true", "false", "on"]}}}'

  jenkins-lint:
    name: Jenkinsfile Lint (npm-groovy-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Jenkinsfile
        id: check
        run: |
          COUNT=$(find . -name "Jenkinsfile*" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install npm-groovy-lint
        if: steps.check.outputs.count != '0'
        run: npm install -g npm-groovy-lint@14.7.0

      - name: Lint Jenkinsfile
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "Jenkinsfile*" | grep -v "vendor\|node_modules" \
            | while read -r f; do
              echo "Linting $f ..."
              npm-groovy-lint \
                --path "$(dirname "$f")" \
                --files "$(basename "$f")" \
                --no-insight \
                --failon warning
            done

  circleci-lint:
    name: CircleCI Config Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for CircleCI config
        id: check
        run: |
          COUNT=$(find . -path "*/.circleci/config.yml" \
            -o -path "*/.circleci/config.yaml" | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install CircleCI CLI
        if: steps.check.outputs.count != '0'
        run: |
          curl -fLSs \
            https://raw.githubusercontent.com/CircleCI-Public/circleci-cli/main/install.sh \
            | sudo bash

      - name: Validate CircleCI config
        if: steps.check.outputs.count != '0'
        run: |
          find . -path "*/.circleci/config.yml" -o -path "*/.circleci/config.yaml" \
            | while read -r f; do
              echo "Validating $f ..."
              circleci config validate "$f"
            done

  packer-lint:
    name: Packer Lint (packer fmt + validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Packer files
        id: check
        run: |
          COUNT=$(find . \( -name "*.pkr.hcl" -o -name "*.pkr.json" -o -name "packer.json" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Packer
        if: steps.check.outputs.count != '0'
        uses: hashicorp/setup-packer@v3.2.0
        with:
          version: 'latest'

      - name: Packer fmt check
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.pkr.hcl" | grep -v "vendor\|node_modules" \
            | while read -r f; do
              packer fmt -check "$f"
            done

      - name: Packer validate
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.pkr.hcl" | grep -v "vendor\|node_modules" \
            | while read -r f; do
              packer init "$f" 2>/dev/null || true
              packer validate "$f"
            done

  kustomize-lint:
    name: Kustomize Lint (kubectl kustomize)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Kustomize files
        id: check
        run: |
          COUNT=$(find . \( -name "kustomization.yml" -o -name "kustomization.yaml" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        if: steps.check.outputs.count != '0'
        uses: azure/setup-kubectl@v4

      - name: Validate Kustomize overlays
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "kustomization.yml" -o -name "kustomization.yaml" \) \
            | grep -v "vendor\|node_modules" \
            | while read -r f; do
              dir=$(dirname "$f")
              echo "Building kustomization in $dir ..."
              kubectl kustomize "$dir" > /dev/null
            done

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .lintrc/security/.gitleaks.toml

  sast-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: |
          pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep SAST
        run: |
          semgrep \
            --config .lintrc/security/.semgrep.yml \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/security-audit \
            --config p/r2c-security-audit \
            --config p/jwt \
            --config p/xss \
            --error \
            --exclude "vendor/" \
            --exclude "node_modules/" \
            --exclude "dist/" \
            --exclude "*.lock" \
            --exclude "*.sum" \
            .

  dependency-scan:
    name: Dependency Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy fs \
            --ignore-unfixed \
            --vuln-type library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile .lintrc/security/.trivyignore \
            --exit-code 1 \
            .

  container-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check
        run: |
          DOCKERFILE=$(find . -name "Dockerfile" | grep -v "vendor\|node_modules" | head -1)
          if [ -n "$DOCKERFILE" ]; then
            echo "found=true"  >> "$GITHUB_OUTPUT"
            echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image for scanning
        if: steps.check.outputs.found == 'true'
        run: |
          docker build \
            -f "${{ steps.check.outputs.dockerfile }}" \
            -t scan-target:latest \
            "$(dirname "${{ steps.check.outputs.dockerfile }}")"

      - name: Install Trivy
        if: steps.check.outputs.found == 'true'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy image scan
        if: steps.check.outputs.found == 'true'
        run: |
          trivy image \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile .lintrc/security/.trivyignore \
            --exit-code 1 \
            scan-target:latest

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Check Node.js licenses
        run: |
          if [ -f "package.json" ]; then
            npx license-checker \
              --onlyAllow \
              "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;CC-BY-4.0;Unlicense;0BSD;Python-2.0;PSF-2.0" \
              --excludePrivatePackages
          else
            echo "No package.json found, skipping Node.js license check."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check Python licenses
        run: |
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            pip install pip-licenses==5.0.0
            ALLOWED="MIT License;Apache Software License;BSD License"
            ALLOWED="$ALLOWED;ISC License (ISCL);Python Software Foundation License"
            ALLOWED="$ALLOWED;The Unlicense (Unlicense)"
            ALLOWED="$ALLOWED;CC0 1.0 Universal (CC0 1.0) Public Domain Dedication"
            pip-licenses --allow-only="$ALLOWED"
          else
            echo "No Python project files found, skipping Python license check."
          fi

  rst-lint:
    name: reStructuredText Lint (rstcheck + doc8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for RST files
        id: check
        run: |
          COUNT=$(find . -name "*.rst" \
            | { grep -vc "vendor\|node_modules\|_build" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install rstcheck and doc8
        if: steps.check.outputs.count != '0'
        run: pip install "rstcheck[sphinx]==6.2.4" doc8==1.1.2

      - name: Run rstcheck
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.rst" | grep -v "vendor\|node_modules\|_build" \
            | xargs rstcheck --report-level info

      - name: Run doc8
        if: steps.check.outputs.count != '0'
        run: |
          mapfile -t RST_FILES < <(find . -name "*.rst" | grep -v "vendor\|_build")
          doc8 --max-line-length 120 "${RST_FILES[@]}"

  asciidoc-lint:
    name: AsciiDoc Lint (asciidoctor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for AsciiDoc files
        id: check
        run: |
          COUNT=$(find . \( -name "*.adoc" -o -name "*.asciidoc" -o -name "*.asc" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Ruby
        if: steps.check.outputs.count != '0'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Asciidoctor
        if: steps.check.outputs.count != '0'
        run: gem install asciidoctor:2.0.23 asciidoctor-diagram:2.3.1

      - name: Run asciidoctor (lint via build)
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.adoc" -o -name "*.asciidoc" \) \
            | grep -v "vendor\|node_modules" \
            | while read -r f; do
              asciidoctor --failure-level WARN -o /dev/null "$f"
            done

  latex-lint:
    name: LaTeX Lint (chktex + lacheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for LaTeX files
        id: check
        run: |
          COUNT=$(find . -name "*.tex" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install LaTeX tools
        if: steps.check.outputs.count != '0'
        run: sudo apt-get install -y --quiet texlive-base chktex lacheck

      - name: Run chktex
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.tex" | grep -v "vendor\|node_modules" \
            | xargs chktex -q -l .lintrc/docs/latex/.chktexrc

      - name: Run lacheck
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.tex" | grep -v "vendor\|node_modules" \
            | xargs lacheck

  notebook-lint:
    name: Jupyter Notebook Lint (nbqa + nbformat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Jupyter notebooks
        id: check
        run: |
          COUNT=$(find . -name "*.ipynb" \
            | { grep -vc "vendor\|node_modules\|\.ipynb_checkpoints" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install tools
        if: steps.check.outputs.count != '0'
        run: pip install nbqa==1.9.1 nbformat==5.10.4 flake8==7.1.1 black==24.10.0 isort==5.13.2

      - name: Run nbformat validation
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.ipynb" | grep -v "vendor\|\.ipynb_checkpoints" \
            | xargs python -m nbformat.validate

      - name: Run nbqa flake8
        if: steps.check.outputs.count != '0'
        run: nbqa flake8 . --max-line-length=120

      - name: Run nbqa black (check only)
        if: steps.check.outputs.count != '0'
        run: nbqa black . --check --diff --line-length 120

      - name: Run nbqa isort (check only)
        if: steps.check.outputs.count != '0'
        run: nbqa isort . --check-only --diff

  makefile-lint:
    name: Makefile Lint (checkmake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Makefiles
        id: check
        run: |
          COUNT=$(find . \( -name "Makefile" -o -name "GNUmakefile" -o -name "*.mk" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Go (for checkmake)
        if: steps.check.outputs.count != '0'
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install checkmake
        if: steps.check.outputs.count != '0'
        run: go install github.com/mrtazz/checkmake/cmd/checkmake@latest

      - name: Run checkmake
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "Makefile" -o -name "GNUmakefile" \) \
            | grep -v "vendor\|node_modules" \
            | xargs checkmake

  cmake-lint:
    name: CMake Lint (cmakelint + cmake-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for CMake files
        id: check
        run: |
          COUNT=$(find . \( -name "CMakeLists.txt" -o -name "*.cmake" \) \
            | { grep -vc "vendor\|node_modules\|build\|CMakeFiles" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install cmakelint and cmake-format
        if: steps.check.outputs.count != '0'
        run: pip install cmakelint==1.4.3 cmake-format==0.6.13

      - name: Run cmakelint
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "CMakeLists.txt" -o -name "*.cmake" \) \
            | grep -v "vendor\|node_modules\|build\|CMakeFiles" \
            | xargs cmakelint --linelength=120

      - name: Check cmake-format
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "CMakeLists.txt" -o -name "*.cmake" \) \
            | grep -v "vendor\|node_modules\|build\|CMakeFiles" \
            | xargs cmake-format --check --config-file .lintrc/infrastructure/build-systems/.cmake-format.yml

  bazel-lint:
    name: Bazel BUILD Lint (buildifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Bazel files
        id: check
        run: |
          COUNT=$(find . \
            \( -name "BUILD" \
            -o -name "BUILD.bazel" \
            -o -name "WORKSPACE" \
            -o -name "WORKSPACE.bazel" \
            -o -name "*.bzl" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install buildifier
        if: steps.check.outputs.count != '0'
        run: |
          BUILDIFIER_VER="7.3.1"
          curl -fsSL \
            "https://github.com/bazelbuild/buildtools/releases/download/v${BUILDIFIER_VER}/buildifier-linux-amd64" \
            -o /usr/local/bin/buildifier
          chmod +x /usr/local/bin/buildifier

      - name: Buildifier lint warnings
        if: steps.check.outputs.count != '0'
        run: |
          find . \
            \( -name "BUILD" \
            -o -name "BUILD.bazel" \
            -o -name "WORKSPACE" \
            -o -name "WORKSPACE.bazel" \
            -o -name "*.bzl" \) \
            | grep -v "vendor\|node_modules" \
            | xargs buildifier --config=.lintrc/infrastructure/build-systems/.buildifier.json --lint=warn

      - name: Buildifier format check
        if: steps.check.outputs.count != '0'
        run: |
          find . \
            \( -name "BUILD" \
            -o -name "BUILD.bazel" \
            -o -name "WORKSPACE" \
            -o -name "WORKSPACE.bazel" \
            -o -name "*.bzl" \) \
            | grep -v "vendor\|node_modules" \
            | xargs buildifier --config=.lintrc/infrastructure/build-systems/.buildifier.json --mode=check

  drone-ci-lint:
    name: Drone CI Lint (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Drone CI config
        id: check
        run: |
          COUNT=$(find . \( -name ".drone.yml" -o -name ".drone.yaml" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        if: steps.check.outputs.count != '0'
        run: pip install yamllint==1.35.1

      - name: Lint Drone CI config
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name ".drone.yml" -o -name ".drone.yaml" \) \
            | grep -v "vendor\|node_modules" \
            | xargs yamllint \
              -d '{extends: default, rules: {line-length: {max: 200}, truthy: {allowed-values: ["true", "false"]}}}'

  bitbucket-lint:
    name: Bitbucket Pipelines Lint (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Bitbucket Pipelines config
        id: check
        run: |
          COUNT=$(find . -name "bitbucket-pipelines.yml" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        if: steps.check.outputs.count != '0'
        run: pip install yamllint==1.35.1

      - name: Lint Bitbucket Pipelines
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "bitbucket-pipelines.yml" \
            | grep -v "vendor\|node_modules" \
            | xargs yamllint \
              -d '{extends: default, rules: {line-length: {max: 200}, truthy: {allowed-values: ["true", "false", "on"]}}}'

  tekton-lint:
    name: Tekton Pipelines Lint (tekton-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Tekton files
        id: check
        run: |
          COUNT=$(find . \( -name "*.yaml" -o -name "*.yml" \) \
            | grep -v "vendor\|node_modules\|\.github" \
            | xargs grep -l "tekton.dev" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install tekton-lint
        if: steps.check.outputs.count != '0'
        run: npm install -g @ibm/tekton-lint@1.1.0

      - name: Run tekton-lint
        if: steps.check.outputs.count != '0'
        run: |
          mapfile -t TEKTON_FILES < <(find . \( -name "*.yaml" -o -name "*.yml" \) \
            | grep -v "vendor\|node_modules\|\.github" \
            | xargs grep -l "tekton.dev" 2>/dev/null)
          tekton-lint "${TEKTON_FILES[@]}"

  argo-lint:
    name: Argo Workflows Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Argo Workflow files
        id: check
        run: |
          COUNT=$(find . \( -name "*.yaml" -o -name "*.yml" \) \
            | grep -v "vendor\|node_modules\|\.github" \
            | xargs grep -l "argoproj.io" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Argo CLI
        if: steps.check.outputs.count != '0'
        run: |
          ARGO_VER="3.5.10"
          curl -fsSL \
            "https://github.com/argoproj/argo-workflows/releases/download/v${ARGO_VER}/argo-linux-amd64.gz" \
            | gunzip > /usr/local/bin/argo
          chmod +x /usr/local/bin/argo

      - name: Lint Argo Workflow files
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.yaml" -o -name "*.yml" \) \
            | grep -v "vendor\|node_modules\|\.github" \
            | xargs grep -l "argoproj.io" 2>/dev/null \
            | while read -r f; do
              echo "Linting $f ..."
              argo lint --offline "$f"
            done

  opa-lint:
    name: OPA / Rego Lint (opa fmt + opa check + conftest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Rego files
        id: check
        run: |
          COUNT=$(find . -name "*.rego" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install OPA
        if: steps.check.outputs.count != '0'
        run: |
          curl -fsSL \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static \
            -o /usr/local/bin/opa
          chmod +x /usr/local/bin/opa

      - name: opa fmt check
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.rego" | grep -v "vendor\|node_modules" \
            | xargs opa fmt --fail

      - name: opa check (parse + types)
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.rego" | grep -v "vendor\|node_modules" \
            | xargs opa check

      - name: Install conftest
        if: steps.check.outputs.count != '0'
        run: |
          CONFTEST_VER="0.55.0"
          curl -fsSL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VER}/conftest_${CONFTEST_VER}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin conftest

      - name: conftest verify
        if: steps.check.outputs.count != '0'
        run: conftest verify

  nginx-lint:
    name: Nginx Config Lint (nginx -t + gixy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Nginx configs
        id: check
        run: |
          COUNT=$(find . \
            \( -name "nginx.conf" -o -name "*.nginx" \
            -o -path "*/nginx/*.conf" -o -path "*/sites-available/*" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Nginx and gixy
        if: steps.check.outputs.count != '0'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nginx
          pip install gixy==0.1.20 || echo "::warning::gixy install failed (Python 3 compat); security scan will be skipped"

      - name: Check Nginx config syntax
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "nginx.conf" | grep -v "vendor\|node_modules" \
            | while read -r f; do
              echo "Checking $f ..."
              sudo nginx -t -c "$(realpath "$f")" 2>&1 || true
            done

      - name: Run gixy (security check)
        if: steps.check.outputs.count != '0'
        run: |
          if command -v gixy &>/dev/null; then
            find . \
              \( -name "nginx.conf" -o -name "*.nginx" \
              -o -path "*/nginx/*.conf" \) \
              | grep -v "vendor\|node_modules" \
              | xargs gixy
          else
            echo "::warning::gixy not available, skipping Nginx security scan."
          fi

  apache-lint:
    name: Apache Config Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Apache configs
        id: check
        run: |
          COUNT=$(find . \
            \( -name "httpd.conf" -o -name "apache2.conf" \
            -o -name "*.vhost" -o -name "*.htaccess" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Apache2
        if: steps.check.outputs.count != '0'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apache2

      - name: Check Apache config syntax
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "httpd.conf" -o -name "apache2.conf" \) \
            | grep -v "vendor\|node_modules" \
            | while read -r f; do
              echo "Checking $f ..."
              sudo apachectl -f "$(realpath "$f")" -t 2>&1 || true
            done

      - name: Validate .htaccess files
        if: steps.check.outputs.count != '0'
        run: |
          find . -name ".htaccess" | grep -v "vendor\|node_modules" \
            | while read -r f; do
              if grep -qP "^[[:space:]]*(RewriteRule|Options|Deny|Allow|AuthType)" "$f" 2>/dev/null; then
                echo "OK: $f contains valid Apache directives"
              fi
            done

  gherkin-lint:
    name: Gherkin / Cucumber Lint (gherkin-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for feature files
        id: check
        run: |
          COUNT=$(find . -name "*.feature" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install gherkin-lint
        if: steps.check.outputs.count != '0'
        run: npm install -g gherkin-lint@4.2.4

      - name: Run gherkin-lint
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.feature" | grep -v "vendor\|node_modules" \
            | xargs gherkin-lint --config .lintrc/testing/.gherkin-lintrc

  robot-lint:
    name: Robot Framework Lint (robocop + robotidy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Robot Framework files
        id: check
        run: |
          COUNT=$(find . \( -name "*.robot" -o -name "*.resource" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install robocop and robotidy
        if: steps.check.outputs.count != '0'
        run: pip install robotframework-robocop==5.7.0 robotframework-tidy==4.14.0

      - name: Run robocop
        if: steps.check.outputs.count != '0'
        run: |
          mapfile -t ROBOT_FILES < <(find . \( -name "*.robot" -o -name "*.resource" \) \
            | grep -v "vendor\|node_modules")
          robocop \
            --config .lintrc/testing/.robocop.toml \
            "${ROBOT_FILES[@]}"

      - name: Check robotidy formatting
        if: steps.check.outputs.count != '0'
        run: |
          mapfile -t ROBOT_FILES < <(find . \( -name "*.robot" -o -name "*.resource" \) \
            | grep -v "vendor\|node_modules")
          robotidy --check --diff "${ROBOT_FILES[@]}"

  editorconfig-lint:
    name: EditorConfig Lint (editorconfig-checker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for .editorconfig
        id: check
        run: |
          if [ -f ".editorconfig" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install editorconfig-checker
        if: steps.check.outputs.found == 'true'
        run: |
          EC_VER="3.0.3"
          curl -fsSL \
            "https://github.com/editorconfig-checker/editorconfig-checker/releases/download/v${EC_VER}/ec-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin --strip-components=1
          mv /usr/local/bin/ec-linux-amd64 /usr/local/bin/ec

      - name: Run editorconfig-checker
        if: steps.check.outputs.found == 'true'
        run: ec

  cue-lint:
    name: CUE Lint (cue vet + cue fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for CUE files
        id: check
        run: |
          COUNT=$(find . -name "*.cue" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install CUE
        if: steps.check.outputs.count != '0'
        run: |
          CUE_VER="0.9.2"
          curl -fsSL \
            "https://github.com/cue-lang/cue/releases/download/v${CUE_VER}/cue_v${CUE_VER}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin cue

      - name: cue vet
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.cue" | grep -v "vendor\|node_modules" \
            | xargs cue vet

      - name: cue fmt check
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.cue" | grep -v "vendor\|node_modules" \
            | xargs cue fmt
          git diff --exit-code -- "*.cue" \
            || (echo "CUE files need formatting. Run 'cue fmt .' locally." && exit 1)

  dhall-lint:
    name: Dhall Lint (dhall lint + dhall format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Dhall files
        id: check
        run: |
          COUNT=$(find . -name "*.dhall" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Dhall
        if: steps.check.outputs.count != '0'
        run: |
          DHALL_VER="1.42.2"
          curl -fsSL \
            "https://github.com/dhall-lang/dhall-haskell/releases/download/${DHALL_VER}/dhall-${DHALL_VER}-x86_64-linux.tar.bz2" \
            | tar xj -C /usr/local/bin --strip-components=2 ./bin/dhall

      - name: dhall lint check
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.dhall" | grep -v "vendor\|node_modules" \
            | while read -r f; do
                dhall lint < "$f" > /tmp/dhall_out
                if ! diff -q "$f" /tmp/dhall_out > /dev/null; then
                  echo "ERROR: $f needs dhall lint"; exit 1
                fi
              done

      - name: dhall format check
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.dhall" | grep -v "vendor\|node_modules" \
            | xargs dhall format
          git diff --exit-code -- "*.dhall" \
            || (echo "Dhall files need formatting. Run 'dhall format' locally." && exit 1)

  kcl-lint:
    name: KCL Lint (kcl fmt + kcl lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for KCL files
        id: check
        run: |
          COUNT=$(find . \( -name "*.k" -o -name "*.kcl" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install KCL
        if: steps.check.outputs.count != '0'
        run: |
          KCL_VER="0.10.7"
          curl -fsSL \
            "https://github.com/kcl-lang/kcl/releases/download/v${KCL_VER}/kclvm-v${KCL_VER}-linux-amd64.tar.gz" \
            | tar xz -C /tmp
          sudo mv /tmp/kclvm /usr/local/kclvm
          sudo ln -sf /usr/local/kclvm/bin/kcl /usr/local/bin/kcl

      - name: kcl fmt check
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.k" -o -name "*.kcl" \) \
            | grep -v "vendor\|node_modules" \
            | xargs kcl fmt
          git diff --exit-code -- "*.k" "*.kcl" \
            || (echo "KCL files need formatting. Run 'kcl fmt' locally." && exit 1)

      - name: kcl lint
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.k" -o -name "*.kcl" \) \
            | grep -v "vendor\|node_modules" \
            | xargs -I{} kcl lint {}

  asyncapi-lint:
    name: AsyncAPI Lint (asyncapi CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for AsyncAPI files
        id: check
        run: |
          COUNT=$(find . \
            \( -name "asyncapi.yml" -o -name "asyncapi.yaml" \
            -o -name "asyncapi.json" \
            -o -name "*.asyncapi.yml" -o -name "*.asyncapi.yaml" \
            -o -name "*.asyncapi.json" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install AsyncAPI CLI
        if: steps.check.outputs.count != '0'
        run: npm install -g @asyncapi/cli@2.12.0

      - name: Run AsyncAPI lint
        if: steps.check.outputs.count != '0'
        run: |
          find . \
            \( -name "asyncapi.yml" -o -name "asyncapi.yaml" \
            -o -name "asyncapi.json" \
            -o -name "*.asyncapi.yml" -o -name "*.asyncapi.yaml" \) \
            | grep -v "vendor\|node_modules" \
            | while read -r f; do
              echo "Linting $f ..."
              asyncapi validate "$f"
            done

  renovate-lint:
    name: Renovate Config Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Renovate config
        id: check
        run: |
          COUNT=$(find . \
            \( -name "renovate.json" -o -name "renovate.json5" \
            -o -name ".renovaterc" -o -name ".renovaterc.json" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install renovate
        if: steps.check.outputs.count != '0'
        run: npm install -g renovate@39.75.0

      - name: Validate Renovate config
        if: steps.check.outputs.count != '0'
        run: |
          find . \
            \( -name "renovate.json" -o -name "renovate.json5" \
            -o -name ".renovaterc" -o -name ".renovaterc.json" \) \
            | grep -v "vendor\|node_modules" \
            | while read -r f; do
              echo "Validating $f ..."
              renovate-config-validator "$f"
            done

  plantuml-lint:
    name: PlantUML Lint (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for PlantUML files
        id: check
        run: |
          COUNT=$(find . \
            \( -name "*.puml" -o -name "*.plantuml" -o -name "*.pu" \) \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        if: steps.check.outputs.count != '0'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Graphviz and PlantUML
        if: steps.check.outputs.count != '0'
        run: |
          sudo apt-get install -y --quiet graphviz
          curl -fsSL \
            https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar \
            -o /usr/local/lib/plantuml.jar

      - name: Check PlantUML syntax
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.puml" -o -name "*.plantuml" -o -name "*.pu" \) \
            | grep -v "vendor\|node_modules" \
            | while read -r f; do
              echo "Checking $f ..."
              java -jar /usr/local/lib/plantuml.jar -syntax "$f"
            done

  solidity-lint:
    name: Solidity Lint (solhint + slither)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Solidity files
        id: check
        run: |
          COUNT=$(find . -name "*.sol" \
            | { grep -vc "vendor\|node_modules" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install solhint
        if: steps.check.outputs.count != '0'
        run: npm install -g solhint@5.0.3

      - name: Run solhint
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.sol" | grep -v "vendor\|node_modules" \
            | xargs solhint --config .lintrc/backend/solidity/.solhint.json

      - name: Set up Python (for slither)
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install slither
        if: steps.check.outputs.count != '0'
        run: pip install slither-analyzer==0.10.4

      - name: Run slither
        if: steps.check.outputs.count != '0'
        run: |
          slither . \
            --exclude naming-convention,solc-version

  # ============================================================
  # 以下为通用 / 跨语言工具 job
  # ============================================================

  ruff-lint:
    name: Ruff (Python Modern Linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Python files
        id: check
        run: |
          COUNT=$(find . -name "*.py" ! -path "./.github/*" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        if: steps.check.outputs.count != '0'
        run: pip install ruff==0.9.4

      - name: Ruff check (lint)
        if: steps.check.outputs.count != '0'
        run: |
          ruff check \
            --config .lintrc/backend/python/ruff.toml \
            --output-format=github \
            .

      - name: Ruff format (format check)
        if: steps.check.outputs.count != '0'
        run: |
          ruff format \
            --config .lintrc/backend/python/ruff.toml \
            --check --diff \
            .

  biome-lint:
    name: Biome (JS/TS Unified Linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for JS/TS files
        id: check
        run: |
          COUNT=$(find . -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \
            | { grep -vc "node_modules\|dist\|build\|\.next\|\.nuxt" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install biome
        if: steps.check.outputs.count != '0'
        run: npm install -g @biomejs/biome@1.9.4

      - name: Run biome check
        if: steps.check.outputs.count != '0'
        run: |
          biome check \
            --config-path .lintrc/frontend/biome.json \
            --diagnostic-level=warn \
            .

  vale-lint:
    name: Vale (Documentation Quality)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for doc files
        id: check
        run: |
          COUNT=$(find . -name "*.md" -o -name "*.rst" -o -name "*.adoc" -o -name "*.txt" \
            | { grep -vc "node_modules\|vendor\|\.git" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install xsltproc
        if: steps.check.outputs.count != '0'
        run: sudo apt-get install -y xsltproc

      - name: Install vale
        if: steps.check.outputs.count != '0'
        run: |
          VALE_VER="3.9.4"
          curl -fsSL \
            "https://github.com/errata-ai/vale/releases/download/v${VALE_VER}/vale_${VALE_VER}_Linux_64-bit.tar.gz" \
            | tar xz -C /usr/local/bin vale

      - name: Sync vale packages
        if: steps.check.outputs.count != '0'
        run: vale --config .lintrc/docs/vale.ini sync

      - name: Run vale
        if: steps.check.outputs.count != '0'
        run: |
          vale --config .lintrc/docs/vale.ini \
            --output=line \
            --glob='*.{md,rst,adoc,txt}' \
            .

  commitlint-lint:
    name: Commitlint (Commit Message)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install commitlint
        run: |
          npm install \
            @commitlint/cli@19.6.0 \
            @commitlint/config-conventional@19.6.0 \
            conventional-changelog-conventionalcommits@8.0.0

      - name: Lint commits
        run: |
          npx commitlint \
            --config .lintrc/git/.commitlintrc.js \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  checkov-lint:
    name: Checkov (IaC Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for IaC files
        id: check
        run: |
          COUNT=$(find . \
            \( -path "./.git" -o -path "./node_modules" -o -path "./vendor" -o -path "./.github" -o -path "./.lintrc" \) -prune \
            -o \( -name "*.tf" -o -name "*.yml" -o -name "*.yaml" -o -name "Dockerfile*" -o -name "*.bicep" -o -name "*.json" \) \
            -print | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install checkov
        if: steps.check.outputs.count != '0'
        run: pip install checkov==3.2.346

      - name: Run checkov
        if: steps.check.outputs.count != '0'
        run: |
          checkov \
            --config-file .lintrc/infrastructure/checkov.yaml \
            --hard-fail-on CRITICAL \
            --output cli --output sarif \
            --output-file-path console,reports/checkov.sarif

  knip-lint:
    name: Knip (Dead Code Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for package.json
        id: check
        run: |
          if [ -f "package.json" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found, skipping Knip."
          fi

      - name: Set up Node.js
        if: steps.check.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        if: steps.check.outputs.found == 'true'
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm@9.15.4 && pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Install knip
        if: steps.check.outputs.found == 'true'
        run: npm install -g knip@5.38.0

      - name: Run knip
        if: steps.check.outputs.found == 'true'
        run: |
          knip \
            --config .lintrc/frontend/knip.json \
            --no-progress

  cspell-lint:
    name: CSpell (Spelling Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install cspell
        run: npm install -g cspell@8.17.1

      - name: Run cspell
        run: |
          cspell lint \
            --config .lintrc/general/cspell.json \
            --no-progress \
            --no-summary \
            --gitignore \
            --exclude ".lintrc/**" \
            "**"

  yamllint-strict:
    name: YAML Lint Strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for YAML files
        id: check
        run: |
          COUNT=$(find . \( -name "*.yml" -o -name "*.yaml" \) \
            ! -path "./.github/*" \
            | { grep -vc "node_modules\|vendor" || true; })
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        if: steps.check.outputs.count != '0'
        run: pip install yamllint==1.35.1

      - name: Run yamllint (strict)
        if: steps.check.outputs.count != '0'
        run: |
          find . \( -name "*.yml" -o -name "*.yaml" \) \
            ! -path "./.github/*" \
            | grep -v "node_modules\|vendor" \
            | xargs yamllint \
              -c .lintrc/data-formats/.yamllint.yml \
              --strict

  ls-lint:
    name: ls-lint (File Naming)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ls-lint
        run: |
          LS_LINT_VER="2.3.1"
          curl -sL "https://github.com/loeffel-io/ls-lint/releases/download/v${LS_LINT_VER}/ls-lint-linux-amd64" \
            -o /usr/local/bin/ls-lint && chmod +x /usr/local/bin/ls-lint

      - name: Run ls-lint
        run: |
          ls-lint \
            --config .lintrc/general/.ls-lint.yml
