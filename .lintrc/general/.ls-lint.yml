---
# ls-lint 配置 — 文件命名规范（针对 bangumi-api-client 项目）
# 文档：https://ls-lint.org/2.x/configuration/the-rules.html
# 用法：ls-lint --config .lintrc/general/.ls-lint.yml

ls:
  # ============================================================
  # 默认全局规则
  # ============================================================
  .default:
    .ts: kebab-case | camelCase
    .gen.ts: kebab-case | camelCase
    .test.ts: kebab-case
    .config.ts: kebab-case
    .json: kebab-case | camelCase
    .yaml: kebab-case | regex:[A-Z._-]+
    .yml: kebab-case | regex:[A-Z._-]+
    .md: SCREAMING_SNAKE_CASE | kebab-case

  # ============================================================
  # .github 目录
  # ============================================================
  .github:
    .yml: kebab-case
    .yaml: kebab-case
    .json: kebab-case
    .md: SCREAMING_SNAKE_CASE | kebab-case

# ============================================================
# 忽略路径
# ============================================================
ignore:
  - .git
