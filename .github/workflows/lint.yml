          [ "$FAILED" -eq 0 ] || exit 1
          echo "JSON syntax check passed."

      - name: prettier (format check)
        if: steps.check-json.outputs.found == 'true'
        run: |
          mapfile -t JSON_FILES < <(find . -name "*.json" \
            ! -path "./.github/*" ! -path "./.lintrc/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" ! -path "./.git/*" 2>/dev/null)
          prettier --config .lintrc/frontend/prettier/.prettierrc --check "${JSON_FILES[@]}"

  xml-lint:
    name: XML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check XML files exist
        id: check-xml
        run: |
          mapfile -t XML_FILES < <(find . \
            \( -name "*.xml" -o -name "*.xsd" -o -name "*.xsl" -o -name "*.xslt" \
               -o -name "*.pom" -o -name "*.wsdl" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          if [ ${#XML_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#XML_FILES[@]} XML file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No XML files found, skipping."
          fi

      - name: Install xmllint
        if: steps.check-xml.outputs.found == 'true'
        run: sudo apt-get install -y --quiet libxml2-utils

      - name: xmllint (well-formed check)
        if: steps.check-xml.outputs.found == 'true'
        run: |
          mapfile -t XML_FILES < <(find . \
            \( -name "*.xml" -o -name "*.xsd" -o -name "*.xsl" -o -name "*.xslt" \
               -o -name "*.pom" -o -name "*.wsdl" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          FAILED=0
          for f in "${XML_FILES[@]}"; do
            xmllint --noout "$f" 2>&1 || { echo "FAIL: $f"; FAILED=1; }
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "XML well-formed check passed."

      - name: xmllint (XSD schema validation, if schema present)
        if: steps.check-xml.outputs.found == 'true'
        run: |
          # 有 XSD 文件时尝试交叉验证 XML；无 XSD 则跳过
          mapfile -t XSD_FILES < <(find . -name "*.xsd" \
            ! -path "./.github/*" ! -path "./vendor/*" 2>/dev/null)
          if [ ${#XSD_FILES[@]} -gt 0 ]; then
            echo "Found XSD schemas, attempting cross-validation."
            # 仅检查 well-formed，schema-validate 需要具体文件对应关系
            echo "XSD found, schema-validation requires per-file mapping."
          else
            echo "No XSD files found, skipping schema validation."
          fi

  toml-lint:
    name: TOML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check TOML files exist
        id: check-toml
        run: |
          mapfile -t TOML_FILES < <(find . -name "*.toml" \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" ! -path "./.git/*" 2>/dev/null)
          if [ ${#TOML_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#TOML_FILES[@]} TOML file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No TOML files found, skipping."
          fi

      - name: Install taplo
        if: steps.check-toml.outputs.found == 'true'
        run: |
          TAPLO_VER="0.9.3"
          curl -sSL \
            "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VER}/taplo-linux-x86_64.gz" \
            -o taplo.gz
          gunzip taplo.gz
          chmod +x taplo
          sudo mv taplo /usr/local/bin/taplo

      - name: taplo (syntax + format check)
        if: steps.check-toml.outputs.found == 'true'
        run: |
          mapfile -t TOML_FILES < <(find . -name "*.toml" \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" ! -path "./.git/*" 2>/dev/null)
          taplo check --config .lintrc/data-formats/toml/taplo.toml "${TOML_FILES[@]}"

      - name: taplo (format check)
        if: steps.check-toml.outputs.found == 'true'
        run: |
          mapfile -t TOML_FILES < <(find . -name "*.toml" \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" ! -path "./.git/*" 2>/dev/null)
          taplo fmt --check --config .lintrc/data-formats/toml/taplo.toml "${TOML_FILES[@]}"

  sql-lint:
    name: SQL Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SQL files exist
        id: check-sql
        run: |
          mapfile -t SQL_FILES < <(find . -name "*.sql" \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          if [ ${#SQL_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#SQL_FILES[@]} SQL file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No SQL files found, skipping."
          fi

      - name: Set up Python
        if: steps.check-sql.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SQLFluff
        if: steps.check-sql.outputs.found == 'true'
        run: pip install sqlfluff==3.3.1

      - name: SQLFluff lint
        if: steps.check-sql.outputs.found == 'true'
        run: |
          mapfile -t SQL_FILES < <(find . -name "*.sql" \
            ! -path "./.github/*" ! -path "./vendor/*" 2>/dev/null)
          sqlfluff lint \
            --config .lintrc/data-formats/sql/.sqlfluff \
            --format github-annotation \
            "${SQL_FILES[@]}"

      - name: SQLFluff format check
        if: steps.check-sql.outputs.found == 'true'
        run: |
          mapfile -t SQL_FILES < <(find . -name "*.sql" \
            ! -path "./.github/*" ! -path "./vendor/*" 2>/dev/null)
          sqlfluff format \
            --config .lintrc/data-formats/sql/.sqlfluff \
            "${SQL_FILES[@]}"
          git diff --exit-code -- "*.sql" || \
            (echo "::error::SQL files need formatting. Run 'sqlfluff format' locally." && exit 1)

  protobuf-lint:
    name: Protocol Buffers Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check proto files exist
        id: check-proto
        run: |
          mapfile -t PROTO_FILES < <(find . -name "*.proto" \
            ! -path "./.github/*" ! -path "./vendor/*" \
            ! -path "./gen/*" ! -path "./third_party/*" 2>/dev/null)
          if [ ${#PROTO_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#PROTO_FILES[@]} proto file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No proto files found, skipping."
          fi

      - name: Install buf
        if: steps.check-proto.outputs.found == 'true'
        run: |
          BUF_VER="1.47.2"
          curl -sSL \
            "https://github.com/bufbuild/buf/releases/download/v${BUF_VER}/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: buf lint
        if: steps.check-proto.outputs.found == 'true'
        run: buf lint --config .lintrc/data-formats/protobuf/buf.yaml

      - name: buf format check
        if: steps.check-proto.outputs.found == 'true'
        run: buf format --diff --exit-code --config .lintrc/data-formats/protobuf/buf.yaml

      - name: buf breaking change detection
        if: steps.check-proto.outputs.found == 'true'
        run: |
          # 对比 HEAD 与 main/master 分支的破坏性变更
          AGAINST_BRANCH="${GITHUB_BASE_REF:-master}"
          if git rev-parse "origin/${AGAINST_BRANCH}" > /dev/null 2>&1; then
            buf breaking \
              --config .lintrc/data-formats/protobuf/buf.yaml \
              --against ".git#branch=${AGAINST_BRANCH}"
          else
            echo "Base branch not found, skipping breaking change detection."
          fi

  graphql-lint:
    name: GraphQL Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GraphQL files exist
        id: check-graphql
        run: |
          mapfile -t GQL_FILES < <(find . \( -name "*.graphql" -o -name "*.gql" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          if [ ${#GQL_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#GQL_FILES[@]} GraphQL file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No GraphQL files found, skipping."
          fi

      - name: Set up Node.js
        if: steps.check-graphql.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install graphql-schema-linter + prettier
        if: steps.check-graphql.outputs.found == 'true'
        run: |
          npm install -g \
            graphql-schema-linter@3.0.1 \
            graphql@16.10.0 \
            prettier@3.4.2

      - name: Set up GraphQL config
        if: steps.check-graphql.outputs.found == 'true'
        run: cp .lintrc/data-formats/graphql/.graphqlrc.yml .graphqlrc.yml

      - name: graphql-schema-linter
        if: steps.check-graphql.outputs.found == 'true'
        run: |
          mapfile -t GQL_FILES < <(find . \( -name "*.graphql" -o -name "*.gql" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          graphql-schema-linter \
            --config-directory . \
            "${GQL_FILES[@]}"

      - name: prettier (format check)
        if: steps.check-graphql.outputs.found == 'true'
        run: |
          mapfile -t GQL_FILES < <(find . \( -name "*.graphql" -o -name "*.gql" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          prettier --config .lintrc/frontend/prettier/.prettierrc --check "${GQL_FILES[@]}"

  openapi-lint:
    name: OpenAPI / Swagger Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OpenAPI files exist
        id: check-openapi
        run: |
          mapfile -t OAS_FILES < <(find . \
            \( -name "openapi*.yaml" -o -name "openapi*.yml" -o -name "openapi*.json" \
               -o -name "swagger*.yaml" -o -name "swagger*.yml" -o -name "swagger*.json" \
               -o -name "*-api-spec.yaml" -o -name "*-api-spec.yml" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          if [ ${#OAS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#OAS_FILES[@]} OpenAPI/Swagger file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No OpenAPI/Swagger files found, skipping."
          fi

      - name: Set up Node.js
        if: steps.check-openapi.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Spectral
        if: steps.check-openapi.outputs.found == 'true'
        run: npm install -g @stoplight/spectral-cli@6.14.2

      - name: Spectral lint
        if: steps.check-openapi.outputs.found == 'true'
        run: |
          mapfile -t OAS_FILES < <(find . \
            \( -name "openapi*.yaml" -o -name "openapi*.yml" -o -name "openapi*.json" \
               -o -name "swagger*.yaml" -o -name "swagger*.yml" -o -name "swagger*.json" \
               -o -name "*-api-spec.yaml" -o -name "*-api-spec.yml" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          for f in "${OAS_FILES[@]}"; do
            echo "Linting: $f"
            spectral lint "$f" \
              --ruleset .lintrc/data-formats/openapi/.spectral.yaml \
              --format github-actions \
              --fail-severity warn
          done

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile files exist
        id: check-docker
        run: |
          mapfile -t DOCKER_FILES < <(find . \
            \( -name "Dockerfile" -o -name "Dockerfile.*" -o -name "*.dockerfile" \) \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" 2>/dev/null)
          if [ ${#DOCKER_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#DOCKER_FILES[@]} Dockerfile(s)."
          else
