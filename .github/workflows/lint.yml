      - name: Check Fantomas formatting
        if: steps.check.outputs.count != '0'
        run: fantomas --check .

      - name: Install FSharpLint
        if: steps.check.outputs.count != '0'
        run: dotnet tool install --global dotnet-fsharplint

      - name: Run FSharpLint
        if: steps.check.outputs.count != '0'
        run: |
          find . -name "*.fsproj" | grep -v "vendor\|node_modules" \
            | xargs -I{} dotnet fsharplint lint --config .lintrc/backend/fsharp/fsharplint.json {}

  clojure-lint:
    name: Clojure Lint (clj-kondo + cljfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Clojure files
        id: check
        run: |
