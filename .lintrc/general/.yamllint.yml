---
# yamllint 配置 — 针对 bangumi-api-client 项目
# 文档：https://yamllint.readthedocs.io/en/stable/configuration.html

extends: default

rules:
  # 行长度：CI workflow 中的 run 块较长，放宽限制
  line-length:
    max: 200

  # 布尔值：允许 on 用于 GitHub Actions 的 on: 触发器
  truthy:
    allowed-values: ["true", "false", "on"]

  # 注释：允许紧贴内容后的注释
  comments:
    min-spaces-from-content: 1
