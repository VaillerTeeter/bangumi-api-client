          fi

      - name: Set up Node.js
        if: steps.check-json.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install jsonlint + prettier
        if: steps.check-json.outputs.found == 'true'
        run: npm install -g @prantlf/jsonlint@16.0.0 prettier@3.4.2

      - name: jsonlint (syntax check)
        if: steps.check-json.outputs.found == 'true'
        run: |
          mapfile -t JSON_FILES < <(find . -name "*.json" \
            ! -path "./.github/*" ! -path "./node_modules/*" \
            ! -path "./vendor/*" ! -path "./.git/*" 2>/dev/null)
          FAILED=0
          for f in "${JSON_FILES[@]}"; do
            jsonlint --quiet "$f" || { echo "FAIL: $f"; FAILED=1; }
