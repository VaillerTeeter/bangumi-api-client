  csharp-lint:
    name: C# Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check C# files exist
        id: check-cs
        run: |
          mapfile -t CS_FILES < <(find . -name "*.cs" \
            ! -path "./.github/*" ! -path "*/bin/*" ! -path "*/obj/*" 2>/dev/null)
          if [ ${#CS_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#CS_FILES[@]} C# file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No C# files found, skipping."
          fi

      - name: Set up .NET
        if: steps.check-cs.outputs.found == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Set up lint config
        if: steps.check-cs.outputs.found == 'true'
        run: cp .lintrc/backend/csharp/.editorconfig-csharp .editorconfig

      - name: dotnet format (format check)
        if: steps.check-cs.outputs.found == 'true'
        run: |
          # 有 solution/project 文件时使用项目模式，否则按目录
          if find . -name "*.sln" ! -path "./.github/*" | grep -q .; then
            find . -name "*.sln" ! -path "./.github/*" | head -1 | \
              xargs dotnet format --verify-no-changes \
                --severity info \
                --exclude "*/bin/**" --exclude "*/obj/**"
          elif find . -name "*.csproj" ! -path "./.github/*" | grep -q .; then
            find . -name "*.csproj" ! -path "./.github/*" | head -1 | \
              xargs dotnet format --verify-no-changes --severity info
          else
            echo "No solution or project file found."
          fi

      - name: Install Roslynator CLI
        if: steps.check-cs.outputs.found == 'true'
        run: dotnet tool install -g roslynator.dotnet.cli

      - name: Roslynator analyze
        if: steps.check-cs.outputs.found == 'true'
        run: |
          if find . -name "*.sln" ! -path "./.github/*" | grep -q .; then
            find . -name "*.sln" ! -path "./.github/*" | head -1 | \
              xargs roslynator analyze \
                --severity-level info \
                --output roslynator-report.xml
          fi

  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PHP files exist
        id: check-php
        run: |
          mapfile -t PHP_FILES < <(find . -name "*.php" \
            ! -path "./.github/*" ! -path "./vendor/*" 2>/dev/null)
          if [ ${#PHP_FILES[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${#PHP_FILES[@]} PHP file(s)."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No PHP files found, skipping."
          fi

      - name: Set up PHP
        if: steps.check-php.outputs.found == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer, phpcs, phpmd, phpstan
          coverage: none

      - name: PHP Syntax Check
        if: steps.check-php.outputs.found == 'true'
        run: |
          mapfile -t PHP_FILES < <(find . -name "*.php" \
            ! -path "./.github/*" ! -path "./vendor/*" 2>/dev/null)
          for f in "${PHP_FILES[@]}"; do
            php -l "$f" || exit 1
          done
          echo "PHP syntax check passed."

      - name: PHP_CodeSniffer (PSR-12)
        if: steps.check-php.outputs.found == 'true'
        run: |
          phpcs --standard=.lintrc/backend/php/.php-rules.xml \
            --extensions=php \
            --ignore=vendor/,node_modules/ \
            --report=full \
            --colors \
            .

      - name: PHPMD (mess detector)
        if: steps.check-php.outputs.found == 'true'
        run: |
          phpmd . text .lintrc/backend/php/phpmd-ruleset.xml \
            --exclude vendor,node_modules \
            --suffixes php

      - name: PHPStan (static analysis)
        if: steps.check-php.outputs.found == 'true'
        run: |
          if [ -f ".lintrc/backend/php/phpstan.neon" ]; then
            phpstan analyse --configuration .lintrc/backend/php/phpstan.neon --no-progress --error-format=github
          else
            echo "No .lintrc/backend/php/phpstan.neon found, running with default config."
            mapfile -t PHP_FILES < <(find . -name "*.php" ! -path "./vendor/*" ! -path "./.github/*" \
              -type f | head -100)
            phpstan analyse \
              --level 9 \
              --no-progress \
              --error-format=github \
              "${PHP_FILES[@]}"
          fi

